<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e4d99"/>
      <stop offset="100%" stop-color="#0d2952"/>
    </linearGradient>
    <linearGradient id="paw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f6ad55"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <ellipse cx="256" cy="200" rx="210" ry="160" fill="#2a5298" opacity="0.18"/>

  <!-- 4 toe pads -->
  <ellipse cx="154" cy="194" rx="48" ry="40" fill="url(#paw)" transform="rotate(-20 154 194)"/>
  <ellipse cx="221" cy="157" rx="50" ry="42" fill="url(#paw)" transform="rotate(-6 221 157)"/>
  <ellipse cx="297" cy="157" rx="50" ry="42" fill="url(#paw)" transform="rotate(6 297 157)"/>
  <ellipse cx="364" cy="194" rx="48" ry="40" fill="url(#paw)" transform="rotate(20 364 194)"/>

  <!-- Main pad -->
  <ellipse cx="259" cy="320" rx="110" ry="96" fill="url(#paw)"/>

  <!-- 3 small inner lobes on main pad (realistic paw detail) -->
  <ellipse cx="222" cy="300" rx="26" ry="21" fill="#d97706" opacity="0.30"/>
  <ellipse cx="259" cy="340" rx="26" ry="21" fill="#d97706" opacity="0.30"/>
  <ellipse cx="296" cy="300" rx="26" ry="21" fill="#d97706" opacity="0.30"/>

  <!-- Small pill badge bottom-right corner (lääkitys) -->
  <rect x="348" y="376" width="108" height="52" rx="26" fill="#48bb78"/>
  <rect x="393" y="389" width="18" height="26" rx="4" fill="white"/>
  <rect x="381" y="401" width="42" height="14" rx="4" fill="white"/>
</svg>
